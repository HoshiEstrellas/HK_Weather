<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港智慧灯柱天气 Web</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --ink: #14201f;
      --muted: #6b7471;
      --line: #d9dfdc;
      --line-strong: #bdc8c2;
      --accent: #087c75;
      --accent-strong: #055f5a;
      --blue: #2f6f9f;
      --warning: #a35c00;
      --danger: #b3261e;
      --ok: #0d7a43;
      --shadow: 0 18px 40px rgba(20, 32, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
      transform: none;
    }

    input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      padding: 0 12px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(8, 124, 117, 0.12);
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(420px, 600px);
      gap: 20px;
      align-items: center;
      padding: 16px clamp(16px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 244, 0.94);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      display: inline-grid;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      overflow-wrap: anywhere;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    h2 {
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h3 {
      font-size: 15px;
      letter-spacing: 0;
    }

    .brand-subtitle,
    .meta-text,
    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.error {
      background: var(--danger);
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .icon-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .icon-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .icon-button.primary:hover {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.2;
    }

    .workspace {
      padding: 26px clamp(16px, 4vw, 44px) 44px;
    }

    .overview {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }

    .metric {
      min-height: 112px;
      padding: 16px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      font-size: clamp(22px, 2.8vw, 34px);
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .metric small {
      color: var(--muted);
      font-size: 12px;
    }

    .system-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px;
    }

    .system-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .system-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .system-row strong {
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(220px, 420px) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .tabs {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .tab-button {
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
    }

    .tab-button:hover {
      transform: none;
      background: rgba(255, 255, 255, 0.72);
    }

    .tab-button.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 8px rgba(20, 32, 31, 0.08);
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .data-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      background: #fafbf8;
    }

    tbody tr {
      transition: background 0.16s ease;
    }

    tbody tr.clickable {
      cursor: pointer;
    }

    tbody tr.clickable:hover {
      background: #f2f7f4;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
    }

    .strong-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .strong-cell strong {
      font-size: 15px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border-radius: 8px;
      background: #eaf2f1;
      color: var(--accent-strong);
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .state-line,
    .empty,
    .error-bar {
      margin: 14px 18px 18px;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .state-line {
      background: #eef3ef;
      color: var(--muted);
    }

    .empty {
      background: #f7f4ee;
      color: var(--warning);
    }

    .error-bar {
      background: #fff0ee;
      color: var(--danger);
      border: 1px solid #f0c7c2;
    }

    .hidden {
      display: none !important;
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      justify-content: flex-end;
      background: rgba(20, 32, 31, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .drawer.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-panel {
      width: min(520px, 100vw);
      height: 100%;
      overflow: auto;
      background: var(--surface);
      box-shadow: var(--shadow);
      transform: translateX(24px);
      transition: transform 0.22s ease;
    }

    .drawer.open .drawer-panel {
      transform: translateX(0);
    }

    .drawer-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .drawer-body {
      padding: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .detail-item {
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .detail-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-item strong {
      display: block;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .history-item strong {
      font-size: 22px;
      line-height: 1;
    }

    .history-meta {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 1180px) {
      .topbar,
      .overview {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }

      .metric:nth-child(3n) {
        border-right: 0;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        padding: 14px;
      }

      .top-actions,
      .controls,
      .search {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric,
      .metric:nth-child(3n) {
        border-right: 1px solid var(--line);
      }

      .metric:nth-child(2n) {
        border-right: 0;
      }

      .section-head {
        flex-direction: column;
      }

      .tabs {
        width: 100%;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">HK</span>
        <div>
          <h1>香港智慧灯柱天气</h1>
          <p class="brand-subtitle" id="windowLabel">当前区间 --</p>
        </div>
      </div>
      <div class="top-actions">
        <input id="apiBaseInput" aria-label="API 地址" placeholder="http://localhost:8080/api/weather">
        <button class="icon-button" id="saveApiBtn" title="保存 API 地址">
          <i data-lucide="save"></i><span>保存</span>
        </button>
        <button class="icon-button" id="refreshBtn" title="刷新数据">
          <i data-lucide="refresh-cw"></i><span>刷新</span>
        </button>
        <span class="status-pill"><span class="dot" id="statusDot"></span><span id="statusText">待连接</span></span>
      </div>
    </header>

    <main class="workspace">
      <section class="overview" aria-label="天气概览">
        <div class="metrics">
          <div class="metric">
            <span>本次平均温度</span>
            <strong id="avgTemp">--</strong>
            <small id="latestFetched">获取 --</small>
          </div>
          <div class="metric">
            <span>今日最高均温</span>
            <strong id="highTemp">--</strong>
            <small>完整区间统计</small>
          </div>
          <div class="metric">
            <span>今日最低均温</span>
            <strong id="lowTemp">--</strong>
            <small>完整区间统计</small>
          </div>
          <div class="metric">
            <span>本次平均湿度</span>
            <strong id="avgHumidity">--</strong>
            <small>相对湿度</small>
          </div>
          <div class="metric">
            <span>本次平均风速</span>
            <strong id="avgWind">--</strong>
            <small>十分钟平均</small>
          </div>
          <div class="metric">
            <span>本次记录数</span>
            <strong id="batchCount">--</strong>
            <small id="totalCount">总量 --</small>
          </div>
        </div>

        <div class="system-panel">
          <div class="system-row">
            <div>
              <h3>同步状态</h3>
              <p class="meta-text" id="lastUpdated">尚未刷新</p>
            </div>
            <button class="icon-button primary" id="syncBtn" title="手动同步">
              <i data-lucide="cloud-download"></i><span>同步</span>
            </button>
          </div>
          <div class="system-row">
            <span class="muted">采集间隔</span>
            <strong id="intervalText">--</strong>
          </div>
          <div class="system-row">
            <span class="muted">灯柱数量</span>
            <strong id="lamppostCount">--</strong>
          </div>
          <div class="system-row">
            <span class="muted">前一小时窗口</span>
            <strong class="mono" id="historyWindowText">--</strong>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="数据筛选">
        <div class="tabs" role="tablist">
          <button class="tab-button active" data-tab="current" type="button">当前数据</button>
          <button class="tab-button" data-tab="history" type="button">前一小时</button>
          <button class="tab-button" data-tab="lampposts" type="button">灯柱列表</button>
        </div>
        <div class="search">
          <input id="keywordInput" aria-label="搜索灯柱编号" placeholder="搜索灯柱编号，如 GF3637">
          <button class="icon-button" id="searchBtn" title="搜索">
            <i data-lucide="search"></i><span>搜索</span>
          </button>
        </div>
        <button class="icon-button" id="clearBtn" title="清空搜索">
          <i data-lucide="x"></i><span>清空</span>
        </button>
      </section>

      <section class="data-section" aria-label="数据列表">
        <div class="section-head">
          <div>
            <h2 id="tableTitle">当前区间数据</h2>
            <p class="meta-text" id="tableMeta">按后端获取时间倒序排列</p>
          </div>
          <span class="badge" id="rowCount">0 条</span>
        </div>
        <div class="error-bar hidden" id="errorBar"></div>
        <div class="state-line hidden" id="loadingLine">加载中...</div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="dataBody"></tbody>
          </table>
        </div>
        <div class="empty hidden" id="emptyLine">暂无数据</div>
      </section>

      <p class="footer-note">页面每 1 分钟自动同步显示数据。</p>
    </main>
  </div>

  <aside class="drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
      <div class="drawer-head">
        <div>
          <p class="meta-text">灯柱详情</p>
          <h2 class="mono" id="drawerTitle">--</h2>
        </div>
        <button class="icon-button" id="closeDrawerBtn" title="关闭">
          <i data-lucide="x"></i><span>关闭</span>
        </button>
      </div>
      <div class="drawer-body" id="drawerBody">
        <div class="state-line">加载中...</div>
      </div>
    </div>
  </aside>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    const DEFAULT_API_BASE = 'http://localhost:8080/api/weather';
    const REFRESH_INTERVAL_MS = 60000;

    const state = {
      apiBase: localStorage.getItem('hkWeatherApiBase') || DEFAULT_API_BASE,
      tab: 'current',
      keyword: '',
      summary: null,
      current: [],
      history: [],
      lampposts: [],
      loading: false,
      autoTimer: null
    };

    const els = {};

    document.addEventListener('DOMContentLoaded', () => {
      cacheElements();
      bindEvents();
      els.apiBaseInput.value = state.apiBase;
      loadActiveData();
      startAutoRefresh();
      refreshIcons();
    });

    function cacheElements() {
      [
        'apiBaseInput', 'saveApiBtn', 'refreshBtn', 'statusDot', 'statusText', 'windowLabel',
        'avgTemp', 'highTemp', 'lowTemp', 'avgHumidity', 'avgWind', 'batchCount', 'latestFetched',
        'totalCount', 'lastUpdated', 'syncBtn', 'intervalText', 'lamppostCount', 'historyWindowText',
        'keywordInput', 'searchBtn', 'clearBtn', 'tableTitle', 'tableMeta', 'rowCount', 'errorBar',
        'loadingLine', 'tableHead', 'dataBody', 'emptyLine', 'detailDrawer', 'closeDrawerBtn',
        'drawerTitle', 'drawerBody'
      ].forEach((id) => {
        els[id] = document.getElementById(id);
      });
      els.tabs = Array.from(document.querySelectorAll('.tab-button'));
    }

    function bindEvents() {
      els.saveApiBtn.addEventListener('click', saveApiBase);
      els.refreshBtn.addEventListener('click', () => loadActiveData());
      els.syncBtn.addEventListener('click', syncNow);
      els.searchBtn.addEventListener('click', search);
      els.keywordInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          search();
        }
      });
      els.clearBtn.addEventListener('click', () => {
        state.keyword = '';
        els.keywordInput.value = '';
        loadActiveData();
      });
      els.tabs.forEach((tab) => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
      });
      els.dataBody.addEventListener('click', handleTableClick);
      els.closeDrawerBtn.addEventListener('click', closeDrawer);
      els.detailDrawer.addEventListener('click', (event) => {
        if (event.target === els.detailDrawer) {
          closeDrawer();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeDrawer();
        }
      });
    }

    function refreshIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    function saveApiBase() {
      state.apiBase = normalizeApiBase(els.apiBaseInput.value || DEFAULT_API_BASE);
      els.apiBaseInput.value = state.apiBase;
      localStorage.setItem('hkWeatherApiBase', state.apiBase);
      setConnection('saved', '已保存');
      loadActiveData();
    }

    function search() {
      state.keyword = els.keywordInput.value.trim();
      if (state.tab === 'lampposts') {
        renderLampposts();
        return;
      }
      loadActiveData();
    }

    function switchTab(tabName) {
      if (state.tab === tabName) {
        return;
      }
      state.tab = tabName;
      els.tabs.forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
      });
      loadActiveData();
    }

    async function loadActiveData(options = {}) {
      const silent = !!options.silent;
      if (!silent) {
        setLoading(true);
        hideError();
      }
      try {
        state.summary = await requestApi('/summary');
        renderSummary();
        if (state.tab === 'current') {
          state.current = await requestApi('/latest', { q: state.keyword, limit: 200 });
          renderObservations('current', state.current);
        } else if (state.tab === 'history') {
          state.history = await requestApi('/history', { q: state.keyword, limit: 300 });
          renderObservations('history', state.history);
        } else {
          if (state.lampposts.length === 0 || !silent) {
            state.lampposts = await requestApi('/lampposts');
          }
          renderLampposts();
        }
        setConnection('ok', '已连接');
        els.lastUpdated.textContent = '刷新 ' + formatDateTime(new Date());
      } catch (error) {
        setConnection('error', '连接失败');
        showError(error.message || '加载失败');
        renderEmpty();
      } finally {
        if (!silent) {
          setLoading(false);
        }
      }
    }

    async function syncNow() {
      els.syncBtn.disabled = true;
      els.syncBtn.querySelector('span').textContent = '同步中';
      hideError();
      try {
        await requestApi('/sync', null, { method: 'POST' });
        await loadActiveData();
      } catch (error) {
        showError(error.message || '同步失败');
      } finally {
        els.syncBtn.disabled = false;
        els.syncBtn.querySelector('span').textContent = '同步';
        refreshIcons();
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      state.autoTimer = setInterval(() => {
        loadActiveData({ silent: true });
      }, REFRESH_INTERVAL_MS);
    }

    function stopAutoRefresh() {
      if (state.autoTimer) {
        clearInterval(state.autoTimer);
        state.autoTimer = null;
      }
    }

    async function requestApi(path, params, options = {}) {
      const url = new URL(normalizePath(path), normalizeApiBase(state.apiBase) + '/');
      if (params) {
        Object.entries(params).forEach(([key, value]) => {
          if (value !== undefined && value !== null && value !== '') {
            url.searchParams.set(key, value);
          }
        });
      }
      const response = await fetch(url.toString(), {
        method: options.method || 'GET',
        headers: {
          Accept: 'application/json'
        }
      });
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error((payload && payload.message) || 'HTTP ' + response.status);
      }
      if (payload && payload.success === false) {
        throw new Error(payload.message || '请求失败');
      }
      return payload && Object.prototype.hasOwnProperty.call(payload, 'data') ? payload.data : payload;
    }

    function renderSummary() {
      const summary = state.summary || {};
      els.avgTemp.textContent = formatTemperature(summary.averageTemperatureC, 1);
      els.highTemp.textContent = formatTemperature(summary.dailyHighestAverageTemperatureC, 1);
      els.lowTemp.textContent = formatTemperature(summary.dailyLowestAverageTemperatureC, 1);
      els.avgHumidity.textContent = formatPercent(summary.averageHumidityPercent, 0);
      els.avgWind.textContent = formatNumber(summary.averageWindSpeed, 1);
      els.batchCount.textContent = summary.latestBatchCount ?? '--';
      els.totalCount.textContent = '总量 ' + (summary.observationCount ?? '--');
      els.latestFetched.textContent = '获取 ' + formatDateTime(summary.lastFetchedAt);
      els.intervalText.textContent = (summary.fetchIntervalMinutes || 10) + ' 分钟';
      els.lamppostCount.textContent = summary.lamppostCount ?? '--';

      const interval = summary.fetchIntervalMinutes || 10;
      els.windowLabel.textContent = '当前区间 ' + formatWindow(currentWindow(interval));
      els.historyWindowText.textContent = formatWindow(previousHourWindow(interval));
    }

    function renderObservations(type, rows) {
      const isHistory = type === 'history';
      els.tableTitle.textContent = isHistory ? '前一小时历史数据' : '当前区间数据';
      els.tableMeta.textContent = isHistory
        ? '只查询当前 10 分钟区间之前 1 小时内的数据'
        : '只显示当前 10 分钟区间内获取到的数据';
      els.tableHead.innerHTML = `
        <tr>
          <th>灯柱</th>
          <th>温度</th>
          <th>湿度</th>
          <th>风速</th>
          <th>风向</th>
          <th>获取时间</th>
          <th>观测时间</th>
        </tr>
      `;
      els.dataBody.innerHTML = rows.map((item) => `
        <tr class="clickable" data-kind="observation" data-lp="${escapeAttribute(item.lpNumber)}" data-device="${escapeAttribute(item.deviceId)}">
          <td>
            <div class="strong-cell">
              <strong class="mono">${escapeHtml(item.lpNumber)}</strong>
              <span class="muted">设备 ${escapeHtml(item.deviceId)}</span>
            </div>
          </td>
          <td><strong>${formatTemperature(item.temperatureC, 1)}</strong></td>
          <td>${formatPercent(item.humidityPercent, 0)}</td>
          <td>${formatNumber(item.windSpeed, 1)}</td>
          <td>${formatDirection(item.windDirectionDeg)}</td>
          <td class="mono">${formatDateTime(item.fetchedAt)}</td>
          <td class="mono">${formatDateTime(item.sourceObservedAt)}</td>
        </tr>
      `).join('');
      setRowCount(rows.length);
      setEmpty(rows.length === 0, isHistory ? '暂无前一小时历史获取记录。' : '暂无当前区间数据。');
    }

    function renderLampposts() {
      const keyword = state.keyword.toLowerCase();
      const rows = state.lampposts.filter((item) => {
        if (!keyword) {
          return true;
        }
        return String(item.lpNumber || '').toLowerCase().includes(keyword)
          || String(item.lpType || '').toLowerCase().includes(keyword)
          || String(item.typeName || '').toLowerCase().includes(keyword);
      });

      els.tableTitle.textContent = '灯柱列表';
      els.tableMeta.textContent = '按灯柱编号和类型浏览';
      els.tableHead.innerHTML = `
        <tr>
          <th>灯柱</th>
          <th>类型</th>
          <th>设备</th>
          <th>纬度</th>
          <th>经度</th>
          <th>更新时间</th>
        </tr>
      `;
      els.dataBody.innerHTML = rows.map((item) => `
        <tr class="clickable" data-kind="lamppost" data-lp="${escapeAttribute(item.lpNumber)}">
          <td><strong class="mono">${escapeHtml(item.lpNumber)}</strong></td>
          <td>
            <div class="strong-cell">
              <strong>${escapeHtml(item.lpType)}</strong>
              <span class="muted">${escapeHtml(item.typeName || '--')}</span>
            </div>
          </td>
          <td class="mono">${escapeHtml(item.deviceIds || '--')}</td>
          <td class="mono">${formatNumber(item.latitude, 6)}</td>
          <td class="mono">${formatNumber(item.longitude, 6)}</td>
          <td class="mono">${formatDateTime(item.updatedAt)}</td>
        </tr>
      `).join('');
      setRowCount(rows.length);
      setEmpty(rows.length === 0, '暂无灯柱数据。');
    }

    function renderEmpty() {
      els.dataBody.innerHTML = '';
      setRowCount(0);
      setEmpty(true, '暂无数据。');
    }

    function handleTableClick(event) {
      const row = event.target.closest('tr[data-kind]');
      if (!row) {
        return;
      }
      openDetail(row.dataset.lp, row.dataset.device || '');
    }

    async function openDetail(lpNumber, deviceId) {
      if (!lpNumber) {
        return;
      }
      els.detailDrawer.classList.add('open');
      els.detailDrawer.setAttribute('aria-hidden', 'false');
      els.drawerTitle.textContent = lpNumber;
      els.drawerBody.innerHTML = '<div class="state-line">加载中...</div>';
      try {
        const [lamppost, history] = await Promise.all([
          requestApi('/lampposts/' + encodeURIComponent(lpNumber)),
          requestApi('/lampposts/' + encodeURIComponent(lpNumber) + '/history', { deviceId, limit: 48 })
        ]);
        renderDetail(lamppost, history, deviceId);
      } catch (error) {
        els.drawerBody.innerHTML = `<div class="error-bar">${escapeHtml(error.message || '加载失败')}</div>`;
      }
    }

    function renderDetail(lamppost, history, deviceId) {
      const coordinate = formatNumber(lamppost.latitude, 6) + ', ' + formatNumber(lamppost.longitude, 6);
      const mapUrl = 'https://www.openstreetmap.org/?mlat=' + encodeURIComponent(lamppost.latitude)
        + '&mlon=' + encodeURIComponent(lamppost.longitude)
        + '#map=18/' + encodeURIComponent(lamppost.latitude) + '/' + encodeURIComponent(lamppost.longitude);
      els.drawerBody.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><span>类型</span><strong>${escapeHtml(lamppost.lpType || '--')}</strong></div>
          <div class="detail-item"><span>设备</span><strong class="mono">${escapeHtml(deviceId || lamppost.deviceIds || '--')}</strong></div>
          <div class="detail-item"><span>坐标</span><strong class="mono">${escapeHtml(coordinate)}</strong></div>
          <div class="detail-item"><span>位置更新时间</span><strong class="mono">${formatDateTime(lamppost.updatedAt)}</strong></div>
        </div>
        <div class="detail-actions">
          <button class="icon-button" id="copyCoordinateBtn" type="button"><i data-lucide="copy"></i><span>复制坐标</span></button>
          <a class="icon-button" href="${escapeAttribute(mapUrl)}" target="_blank" rel="noreferrer"><i data-lucide="map-pin"></i><span>地图</span></a>
        </div>
        <h3>前一小时历史观测</h3>
        <div class="history-list">
          ${history.length ? history.map(renderHistoryItem).join('') : '<div class="empty">这个灯柱前一小时暂时没有历史记录。</div>'}
        </div>
      `;
      const copyButton = document.getElementById('copyCoordinateBtn');
      copyButton.addEventListener('click', () => copyText(coordinate));
      refreshIcons();
    }

    function renderHistoryItem(item) {
      return `
        <div class="history-item">
          <strong>${formatTemperature(item.temperatureC, 1)}</strong>
          <div class="history-meta">
            <span>获取 ${formatDateTime(item.fetchedAt)}</span>
            <span>观测 ${formatDateTime(item.sourceObservedAt)}</span>
            <span>湿度 ${formatPercent(item.humidityPercent, 0)} · 风速 ${formatNumber(item.windSpeed, 1)} · 风向 ${formatDirection(item.windDirectionDeg)}</span>
          </div>
        </div>
      `;
    }

    function closeDrawer() {
      els.detailDrawer.classList.remove('open');
      els.detailDrawer.setAttribute('aria-hidden', 'true');
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        setConnection('ok', '已复制');
      } catch (error) {
        setConnection('error', '复制失败');
      }
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      els.loadingLine.classList.toggle('hidden', !isLoading);
      els.refreshBtn.disabled = isLoading;
    }

    function setConnection(status, text) {
      els.statusText.textContent = text;
      els.statusDot.className = 'dot';
      if (status === 'ok' || status === 'saved') {
        els.statusDot.classList.add('ok');
      }
      if (status === 'error') {
        els.statusDot.classList.add('error');
      }
    }

    function showError(message) {
      els.errorBar.textContent = message;
      els.errorBar.classList.remove('hidden');
    }

    function hideError() {
      els.errorBar.textContent = '';
      els.errorBar.classList.add('hidden');
    }

    function setRowCount(count) {
      els.rowCount.textContent = count + ' 条';
    }

    function setEmpty(show, message) {
      els.emptyLine.textContent = message;
      els.emptyLine.classList.toggle('hidden', !show);
    }

    function currentWindow(intervalMinutes) {
      const now = new Date();
      const start = new Date(now);
      start.setMinutes(Math.floor(now.getMinutes() / intervalMinutes) * intervalMinutes, 0, 0);
      const end = new Date(start);
      end.setMinutes(start.getMinutes() + intervalMinutes);
      return { start, end };
    }

    function previousHourWindow(intervalMinutes) {
      const current = currentWindow(intervalMinutes);
      const start = new Date(current.start);
      start.setHours(start.getHours() - 1);
      return { start, end: current.start };
    }

    function formatWindow(windowValue) {
      return formatTime(windowValue.start) + ' - ' + formatTime(windowValue.end);
    }

    function formatTemperature(value, digits) {
      const number = toNumber(value);
      return number === null ? '--' : number.toFixed(digits) + '°C';
    }

    function formatPercent(value, digits) {
      const number = toNumber(value);
      return number === null ? '--' : number.toFixed(digits) + '%';
    }

    function formatNumber(value, digits) {
      const number = toNumber(value);
      return number === null ? '--' : number.toFixed(digits);
    }

    function formatDirection(value) {
      const number = toNumber(value);
      return number === null ? '--' : Math.round(number) + '°';
    }

    function formatDateTime(value) {
      if (!value) {
        return '--';
      }
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) {
        return '--';
      }
      return date.toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function formatTime(value) {
      return value.toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === '') {
        return null;
      }
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function normalizeApiBase(value) {
      return String(value || DEFAULT_API_BASE).trim().replace(/\/+$/, '');
    }

    function normalizePath(path) {
      return String(path || '').replace(/^\/+/, '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
